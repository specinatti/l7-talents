<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidatos - L7 Talents</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="layout">
    <aside class="sidebar">
      <a href="/pages/empregador/dashboard.html" class="sidebar-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/pages/empregador/vagas.html" class="sidebar-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 13.255A23.931 23.931 0 0 1 12 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2m4 6h.01M5 20h14a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/></svg>
        Minhas Vagas
      </a>
      <a href="/pages/empregador/candidatos.html" class="sidebar-item active">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Candidatos
      </a>
      <a href="/pages/empregador/perfil.html" class="sidebar-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Empresa
      </a>
    </aside>

    <main class="main-content">
      <h1 style="font-size:24px;font-weight:700;margin-bottom:24px;">Candidatos</h1>

      <div id="alert-container"></div>

      <div class="card">
        <div id="list">
          <div style="text-align:center;padding:40px;color:var(--gray-400);">Carregando...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal detalhe candidato -->
  <div id="modal-cand" class="modal-overlay hidden">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h3 class="modal-title" id="cand-nome">Candidato</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div id="cand-detail"></div>
      <hr style="margin:20px 0;border-color:var(--gray-200);">
      <h4 style="font-size:15px;font-weight:600;margin-bottom:12px;">Atualizar Status</h4>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
        <button class="btn btn-secondary btn-sm" onclick="updateStatus('visualizada')">Visualizada</button>
        <button class="btn btn-secondary btn-sm" onclick="updateStatus('em_analise')">Em análise</button>
        <button class="btn btn-secondary btn-sm" onclick="updateStatus('entrevista')" style="background:#dcfce7;color:#166534;border-color:#bbf7d0;">Entrevista</button>
        <button class="btn btn-success btn-sm" onclick="updateStatus('aprovado')">Aprovado ✓</button>
        <button class="btn btn-danger btn-sm" onclick="updateStatus('reprovado')">Reprovado</button>
      </div>
      <div class="form-group">
        <label class="form-label">Feedback para o candidato</label>
        <textarea id="feedback-input" class="form-control" rows="2" placeholder="Opcional: deixe um feedback..."></textarea>
      </div>
      <hr style="margin:20px 0;border-color:var(--gray-200);">
      <h4 style="font-size:15px;font-weight:600;margin-bottom:12px;">Chat</h4>
      <div id="msg-list" style="max-height:200px;overflow-y:auto;padding:8px 0;margin-bottom:12px;"></div>
      <form id="msg-form" style="display:flex;gap:8px;">
        <input type="text" id="msg-input" class="form-control" placeholder="Mensagem..." required>
        <button type="submit" class="btn btn-primary btn-sm">Enviar</button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!auth.redirectIfNotLogged('empregador')) {}
    initNavbar('empregador');

    let currentCandidaturaId = null;
    const params = new URLSearchParams(location.search);
    const vagaFilter = params.get('vaga');

    async function load() {
      try {
        const url = vagaFilter ? `/empregadores/candidatos?vaga_id=${vagaFilter}` : '/empregadores/candidatos';
        const candidatos = await get(url);
        const el = document.getElementById('list');
        if (!candidatos.length) {
          el.innerHTML = '<p style="text-align:center;padding:40px;color:var(--gray-400);">Nenhum candidato ainda.</p>';
          return;
        }
        el.innerHTML = `<div class="table-wrapper"><table>
          <thead><tr><th>Nome</th><th>E-mail</th><th>Cargo desejado</th><th>Nível</th><th>Status</th><th>Data</th><th></th></tr></thead>
          <tbody>${candidatos.map(c => `
            <tr>
              <td class="fw-600">${c.nome}</td>
              <td class="text-muted">${c.email}</td>
              <td>${c.cargo_desejado || '-'}</td>
              <td>${c.nivel_experiencia ? `<span class="badge badge-gray">${c.nivel_experiencia}</span>` : '-'}</td>
              <td>${statusBadge(c.status)}</td>
              <td class="text-muted">${formatDate(c.created_at)}</td>
              <td><button class="btn btn-primary btn-sm" onclick='openCand(${JSON.stringify(c)})'>Ver</button></td>
            </tr>
          `).join('')}</tbody>
        </table></div>`;
      } catch (err) {
        showAlert('Erro ao carregar candidatos', 'error', document.getElementById('alert-container'));
      }
    }

    function openCand(c) {
      currentCandidaturaId = c.id;
      document.getElementById('cand-nome').textContent = c.nome;
      document.getElementById('cand-detail').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:14px;">
          <div><span class="text-muted">E-mail:</span> ${c.email}</div>
          <div><span class="text-muted">Telefone:</span> ${c.telefone || '-'}</div>
          <div><span class="text-muted">Cargo desejado:</span> ${c.cargo_desejado || '-'}</div>
          <div><span class="text-muted">Nível:</span> ${c.nivel_experiencia || '-'}</div>
          ${c.linkedin ? `<div><span class="text-muted">LinkedIn:</span> <a href="${c.linkedin}" target="_blank">Ver perfil</a></div>` : ''}
          ${c.habilidades?.length ? `<div style="grid-column:1/-1;"><span class="text-muted">Habilidades:</span> ${c.habilidades.map(h => `<span class="badge badge-blue" style="margin:2px;">${h}</span>`).join('')}</div>` : ''}
        </div>
        <div style="margin-top:12px;"><span class="text-muted">Status atual:</span> ${statusBadge(c.status)}</div>
        ${c.carta_apresentacao ? `<div style="margin-top:12px;padding:12px;background:var(--gray-50);border-radius:var(--radius);font-size:13px;"><strong>Carta de apresentação:</strong><p style="margin-top:4px;">${c.carta_apresentacao}</p></div>` : ''}
      `;
      document.getElementById('feedback-input').value = c.feedback || '';
      document.getElementById('modal-cand').classList.remove('hidden');
      loadMsgs();
    }

    function closeModal() { document.getElementById('modal-cand').classList.add('hidden'); }

    async function updateStatus(status) {
      try {
        await put(`/empregadores/candidaturas/${currentCandidaturaId}/status`, {
          status,
          feedback: document.getElementById('feedback-input').value || null,
        });
        showAlert(`Status atualizado para: ${status}`, 'success', document.getElementById('alert-container'));
        closeModal();
        load();
      } catch (err) {
        showAlert(err.message, 'error', document.getElementById('alert-container'));
      }
    }

    async function loadMsgs() {
      const el = document.getElementById('msg-list');
      try {
        const msgs = await get(`/candidaturas/${currentCandidaturaId}/mensagens`);
        const userId = auth.getUser().id;
        el.innerHTML = msgs.length ? msgs.map(m => `
          <div style="display:flex;flex-direction:column;align-items:${m.remetente_id === userId ? 'flex-end' : 'flex-start'};margin-bottom:8px;">
            <div style="background:${m.remetente_id === userId ? 'var(--primary)' : 'var(--gray-100)'};color:${m.remetente_id === userId ? 'white' : 'var(--gray-800)'};padding:8px 14px;border-radius:12px;max-width:80%;font-size:13px;">${m.conteudo}</div>
          </div>
        `).join('') : '<p class="text-muted text-center text-sm">Nenhuma mensagem.</p>';
        el.scrollTop = el.scrollHeight;
      } catch {}
    }

    document.getElementById('msg-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('msg-input');
      try {
        await post(`/candidaturas/${currentCandidaturaId}/mensagens`, { conteudo: input.value });
        input.value = '';
        loadMsgs();
      } catch {}
    });

    load();
  </script>
</body>
</html>
