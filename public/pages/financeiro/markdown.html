<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentação Técnica - L7 Talents</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <!-- Marked.js para renderizar markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <style>
    .layout { display: flex; min-height: calc(100vh - 64px); }
    .doc-sidebar {
      width: 220px; flex-shrink: 0; background: var(--cream2);
      border-right: 1px solid rgba(27,42,74,.1); padding: 20px 12px;
      position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto;
    }
    .doc-sidebar h3 { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .08em; margin: 0 0 10px 8px; }
    .doc-link {
      display: block; padding: 9px 12px; border-radius: 6px; font-size: 13px;
      color: var(--navy); text-decoration: none; margin-bottom: 2px; transition: background .15s;
    }
    .doc-link:hover { background: var(--cream); text-decoration: none; }
    .doc-link.active { background: var(--cream); color: var(--rose); font-weight: 600; }
    .doc-content { flex: 1; padding: 32px 40px; max-width: 860px; overflow-y: auto; }
    .doc-content h1 { font-family: 'Playfair Display', serif; font-size: 30px; color: var(--navy); margin-bottom: 8px; }
    .doc-content h2 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--navy); margin: 32px 0 10px; border-bottom: 2px solid var(--rose); padding-bottom: 6px; }
    .doc-content h3 { font-size: 15px; font-weight: 600; color: var(--navy); margin: 20px 0 8px; }
    .doc-content p, .doc-content li { font-size: 14px; color: #374151; line-height: 1.75; }
    .doc-content ul, .doc-content ol { padding-left: 20px; margin-bottom: 12px; }
    .doc-content code { background: var(--cream2); padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: monospace; color: var(--rose); }
    .doc-content pre { background: var(--navy); color: #e2e8f0; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
    .doc-content pre code { background: none; color: inherit; padding: 0; }
    .doc-content table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 12px 0; }
    .doc-content th { background: var(--cream2); padding: 8px 12px; text-align: left; color: var(--navy); font-weight: 600; }
    .doc-content td { padding: 8px 12px; border-bottom: 1px solid var(--cream2); }
    .doc-content blockquote { border-left: 4px solid var(--rose); padding: 8px 16px; margin: 12px 0; background: var(--cream2); border-radius: 0 6px 6px 0; }
    .doc-content a { color: var(--rose); }
    #loading { text-align: center; padding: 60px; color: var(--gray-500); }
    .print-btn { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    @media (max-width: 768px) { .doc-sidebar { display: none; } .doc-content { padding: 20px; } }
    @media print { .doc-sidebar, .print-btn, #navbar { display: none; } .doc-content { padding: 0; } }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="layout">
    <aside class="doc-sidebar">
      <h3>Documentos</h3>
      <a class="doc-link" href="#" onclick="loadDoc('README.md',this)">📋 Visão Geral</a>
      <a class="doc-link" href="#" onclick="loadDoc('ARCHITECTURE.md',this)">🏗️ Arquitetura</a>
      <a class="doc-link" href="#" onclick="loadDoc('SECURITY.md',this)">🔒 Segurança</a>
      <a class="doc-link" href="#" onclick="loadDoc('README-SECURITY.md',this)">🛡️ Guia de Segurança</a>
      <a class="doc-link" href="#" onclick="loadDoc('IMPLEMENTATION-SUMMARY.md',this)">📝 Implementação</a>
      <a class="doc-link" href="#" onclick="loadDoc('QUICKSTART.md',this)">🚀 Quickstart</a>
      <a class="doc-link" href="#" onclick="loadDoc('START-HERE.md',this)">⭐ Start Here</a>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--cream);">
        <a class="doc-link" href="/pages/financeiro/dashboard.html">← Dashboard</a>
        <a class="doc-link" href="/pages/financeiro/docs.html">📄 Doc. Portal</a>
      </div>
    </aside>
    <div class="doc-content" id="doc-content">
      <div id="loading">Selecione um documento ao lado</div>
    </div>
  </div>

  <button class="print-btn" onclick="window.print()">🖨️ Salvar PDF</button>

  <script src="/js/app.js"></script>
  <script>
    if (!auth.redirectIfNotLogged('financeiro')) {}
    initNavbar('financeiro');

    let activeLink = null;

    async function loadDoc(file, el) {
      if (activeLink) activeLink.classList.remove('active');
      el.classList.add('active');
      activeLink = el;

      document.getElementById('doc-content').innerHTML = '<div id="loading">Carregando...</div>';
      try {
        const token = auth.getToken();
        const res = await fetch(`/api/financeiro/docs/${file}`, { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) throw new Error('Erro ao carregar');
        const md = await res.text();
        document.getElementById('doc-content').innerHTML = marked.parse(md);
        window.scrollTo(0, 0);
      } catch (e) {
        document.getElementById('doc-content').innerHTML = `<p style="color:var(--rose)">Erro ao carregar documento: ${e.message}</p>`;
      }
    }

    // Carregar o primeiro doc automaticamente
    document.querySelector('.doc-link').click();
  </script>
</body>
</html>
