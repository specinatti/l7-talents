<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Candidaturas - L7 Talents</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="layout">
    <aside class="sidebar">
      <a href="/pages/candidato/dashboard.html" class="sidebar-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/pages/vagas.html" class="sidebar-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Buscar Vagas
      </a>
      <a href="/pages/candidato/candidaturas.html" class="sidebar-item active">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
        Candidaturas
      </a>
      <a href="/pages/candidato/perfil.html" class="sidebar-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Meu Perfil
      </a>
    </aside>

    <main class="main-content">
      <h1 style="font-size:24px;font-weight:700;margin-bottom:24px;">Minhas Candidaturas</h1>

      <!-- Filtros -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;">
        <button class="btn btn-secondary btn-sm filter-btn active" data-status="">Todas</button>
        <button class="btn btn-secondary btn-sm filter-btn" data-status="enviada">Enviadas</button>
        <button class="btn btn-secondary btn-sm filter-btn" data-status="em_analise">Em análise</button>
        <button class="btn btn-secondary btn-sm filter-btn" data-status="entrevista">Entrevista</button>
        <button class="btn btn-secondary btn-sm filter-btn" data-status="aprovado">Aprovadas</button>
        <button class="btn btn-secondary btn-sm filter-btn" data-status="reprovado">Reprovadas</button>
      </div>

      <div class="card">
        <div id="list">
          <div style="text-align:center;padding:40px;color:var(--gray-400);">Carregando...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal mensagens -->
  <div id="modal-msg" class="modal-overlay hidden">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h3 class="modal-title" id="msg-title">Mensagens</h3>
        <button class="modal-close" onclick="document.getElementById('modal-msg').classList.add('hidden')">×</button>
      </div>
      <div id="msg-list" style="max-height:300px;overflow-y:auto;padding:8px 0;margin-bottom:16px;"></div>
      <form id="msg-form" style="display:flex;gap:8px;">
        <input type="text" id="msg-input" class="form-control" placeholder="Digite sua mensagem..." required>
        <button type="submit" class="btn btn-primary">Enviar</button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!auth.redirectIfNotLogged('candidato')) {}
    initNavbar('candidato');

    let allCandidaturas = [];
    let currentCandidaturaId = null;

    async function load() {
      try {
        allCandidaturas = await get('/candidatos/candidaturas');
        render(allCandidaturas);
      } catch (err) {
        document.getElementById('list').innerHTML = '<p class="text-muted text-center">Erro ao carregar candidaturas.</p>';
      }
    }

    function render(items) {
      const el = document.getElementById('list');
      if (!items.length) {
        el.innerHTML = '<p style="text-align:center;padding:40px;color:var(--gray-400);">Nenhuma candidatura encontrada. <a href="/pages/vagas.html">Buscar vagas</a></p>';
        return;
      }
      el.innerHTML = `<div class="table-wrapper"><table>
        <thead><tr><th>Vaga</th><th>Empresa</th><th>Modalidade</th><th>Status</th><th>Data</th><th></th></tr></thead>
        <tbody>${items.map(c => `
          <tr>
            <td><a href="/pages/vaga.html?id=${c.vaga_id}" class="fw-600">${c.titulo}</a></td>
            <td>${c.empresa || ''}</td>
            <td>${c.modalidade ? modalidadeBadge(c.modalidade) : '-'}</td>
            <td>${statusBadge(c.status)}</td>
            <td class="text-muted">${formatDate(c.created_at)}</td>
            <td><button class="btn btn-secondary btn-sm" onclick="openMsgs('${c.id}', '${c.titulo}')">💬 Chat</button></td>
          </tr>
          ${c.feedback ? `<tr><td colspan="6" style="padding:8px 16px;background:var(--gray-50);font-size:13px;color:var(--gray-600);">📝 Feedback: ${c.feedback}</td></tr>` : ''}
        `).join('')}</tbody>
      </table></div>`;
    }

    // Filtros
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const status = btn.dataset.status;
        render(status ? allCandidaturas.filter(c => c.status === status) : allCandidaturas);
      });
    });

    async function openMsgs(candidaturaId, titulo) {
      currentCandidaturaId = candidaturaId;
      document.getElementById('msg-title').textContent = `Chat – ${titulo}`;
      document.getElementById('modal-msg').classList.remove('hidden');
      await loadMsgs();
    }

    async function loadMsgs() {
      const el = document.getElementById('msg-list');
      try {
        const msgs = await get(`/candidaturas/${currentCandidaturaId}/mensagens`);
        const userId = auth.getUser().id;
        el.innerHTML = msgs.length ? msgs.map(m => `
          <div style="display:flex;flex-direction:column;align-items:${m.remetente_id === userId ? 'flex-end' : 'flex-start'};margin-bottom:8px;">
            <div style="background:${m.remetente_id === userId ? 'var(--primary)' : 'var(--gray-100)'};color:${m.remetente_id === userId ? 'white' : 'var(--gray-800)'};padding:8px 14px;border-radius:12px;max-width:80%;font-size:14px;">${m.conteudo}</div>
            <span style="font-size:11px;color:var(--gray-400);margin-top:2px;">${formatDate(m.created_at)}</span>
          </div>
        `).join('') : '<p class="text-muted text-center text-sm">Nenhuma mensagem ainda.</p>';
        el.scrollTop = el.scrollHeight;
      } catch {}
    }

    document.getElementById('msg-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('msg-input');
      try {
        await post(`/candidaturas/${currentCandidaturaId}/mensagens`, { conteudo: input.value });
        input.value = '';
        loadMsgs();
      } catch (err) {
        showAlert(err.message, 'error');
      }
    });

    load();
  </script>
</body>
</html>
