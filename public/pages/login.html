<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - L7 Talents</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--cream); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .auth-card { background: var(--cream2); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 40px; width: 100%; max-width: 420px; border: 1px solid rgba(27,42,74,.08); }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo a { font-size: 24px; font-weight: 800; color: var(--primary); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .auth-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .auth-sub { color: var(--gray-500); font-size: 14px; margin-bottom: 28px; }
    .divider { text-align: center; color: var(--gray-400); font-size: 13px; margin: 20px 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--gray-200); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <a href="/">
        <img src="/images/l7-logo.jpg" alt="L7 Talents" style="height:52px;object-fit:contain;">
      </a>
    </div>

    <h1 class="auth-title">Bem-vindo de volta</h1>
    <p class="auth-sub">Entre na sua conta para continuar</p>

    <div id="alert-container"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between;">
          Senha
          <a href="/pages/esqueci-senha.html" style="font-weight:400;font-size:13px;">Esqueci a senha</a>
        </label>
        <div style="position:relative;">
        <input type="password" id="password" class="form-control" placeholder="••••••••" required style="padding-right:40px;">
        <button type="button" onclick="toggleSenha()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:18px;" id="toggle-senha">👁</button>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Entrar</button>
    </form>

    <div class="divider">ou</div>

    <p class="text-center text-sm" style="color:var(--gray-600);">
      Não tem conta? <a href="/pages/cadastro.html">Criar conta grátis</a>
    </p>
  </div>

  <script src="/js/app.js"></script>
  <script>
    function toggleSenha() {
      const f = document.getElementById('password');
      const b = document.getElementById('toggle-senha');
      if (f.type === 'password') { f.type = 'text'; b.textContent = '🙈'; }
      else { f.type = 'password'; b.textContent = '👁'; }
    }

    if (auth.isLogged()) {      const user = auth.getUser();
      window.location.href = `/pages/${user.role}/dashboard.html`;
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      setLoading(btn, true);
      try {
        const data = await post('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        auth.setSession(data.token, data.user);
        window.location.href = `/pages/${data.user.role}/dashboard.html`;
      } catch (err) {
        showAlert(err.message, 'error', document.getElementById('alert-container'));
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
